bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.8
      use_astar: false
      allow_unknown: true

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 5.0
    footprint: "[[0.35, 0.30], [0.35, -0.30], [-0.35, -0.30], [-0.35, 0.30]]"
    odom_topic: /odometry/filtered
    controller_plugins: ["FollowPath"]
    goal_checker_plugins: ["goal_checker"]
    progress_checker_plugins: ["progress_checker"]

    progress_checker:
       plugin: "nav2_controller::SimpleProgressChecker"
       required_movement_radius: 0.05
       movement_time_allowance: 20.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 3.14  # Ignore final heading error to prevent end-of-goal spinning
      stateful: true

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      transform_tolerance: 1.0  # Allows 1s of lag between Pi 5 and Tiva-C before failing
      min_vel_x: 0.0
      max_vel_x: 0.26
      min_vel_y: 0.0
      max_vel_y: 0.0
      min_vel_theta: -0.6       # ✔️ تم تصحيحه ليكون الحد الأدنى بالسالب
      max_vel_theta: 0.6        # Capping spin speed to prevent sensor motion blur
      min_speed_xy: 0.0
      max_speed_xy: 0.26        # Required by DWB; leaving it at the default 0.0 rejects all forward trajectories
      min_speed_theta: 0.0
      acc_lim_x: 0.5            # Smoother starts for the 20kg chassis
      acc_lim_theta: 2.0        # Prevent jerky rotations
      vx_samples: 20
      vy_samples: 1
      vtheta_samples: 30
      sim_time: 1.0
      linear_granularity: 0.05
      angular_granularity: 0.025
      xy_goal_tolerance: 0.20
      trans_stopped_velocity: 0.01
      short_circuit_trajectory_evaluation: true
      stateful: true

      critics:
         - RotateToGoal
         - Oscillation
         - BaseObstacle
         - GoalAlign
         - PathAlign
         - PathDist
         - GoalDist

      PathAlign:
        scale: 10.0
      GoalAlign:
        scale: 10.0
      PathDist:
        scale: 32.0   
      GoalDist:
        scale: 24.0    
      RotateToGoal:
        scale: 0.0     # Force robot to drive forward even if not perfectly aimed
      BaseObstacle:
        scale: 5.0     # رَفع القيمة عشان يحترم الحوائط ويبعد عنها قبل تدخل الـ Collision monitor

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_link
      transform_tolerance: 10.0    # Stop costmap from "blanking out" due to TF lag
      rolling_window: true
      width: 2
      height: 2
      resolution: 0.05
      update_frequency: 4.0       # Reduce CPU load to fix "Planner missed rate" errors
      publish_frequency: 1.0      # Reduce CPU load
      footprint: "[[0.35, 0.30], [0.35, -0.30], [-0.35, -0.30], [-0.35, 0.30]]"
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_max_range: 6.0
          obstacle_min_range: 0.35 # ✔️ تم تعديله ليتناسب مع هيكل الروبوت الخارجي ومنع تدمير الخلايا
          raytrace_max_range: 7.0
          raytrace_min_range: 0.35
          sensor_frame: laser

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.50    # ⚡ تم زيادته ليكون أكبر من نصف عرض الروبوت الحقيقي لحسابات الـ DWB
        cost_scaling_factor: 5.0 # ⚡ زيادة المنحنى عشان يقدر يناور في الأماكن الضيقة بدون خوف مبالغ فيه

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_link
      transform_tolerance: 1.0    
      rolling_window: false
      width: 20
      height: 20
      resolution: 0.05
      update_frequency: 10.0
      publish_frequency: 1.0      
      footprint: "[[0.35, 0.30], [0.35, -0.30], [-0.35, -0.30], [-0.35, 0.30]]"
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_max_range: 2.5
          obstacle_min_range: 0.35 # ⚡ إصلاح قاتل: منع الروبوت من حبس نفسه داخل عوائق وهمية من جسمه
          raytrace_max_range: 3.0
          raytrace_min_range: 0.35
          sensor_frame: laser

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.60   
        cost_scaling_factor: 10.0

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    max_velocity: [0.26, 0.0, 0.6] 
    min_velocity: [-0.26, 0.0, -0.6]
    max_accel: [0.8, 0.0, 0.5]     
    max_decel: [-0.8, 0.0, -0.5]
    odom_topic: /odometry/filtered

collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: base_link
    odom_frame_id: odom
    transform_tolerance: 1.0       
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
    polygons: ["PolygonStop"]
    PolygonStop:
      type: "polygon"
      # ✔️ تم تصحيح النقاط لتعطي صندوق أمان حقيقي يحيط بالروبوت بالكامل (+5 سم أمان)
      points: '[[0.40, 0.35], [0.40, -0.35], [-0.40, -0.35], [-0.40, 0.35]]'
      action_type: "stop"

lifecycle_manager_navigation:
  ros__parameters:
    autostart: true
    node_names: ['controller_server', 'planner_server', 'behavior_server', 'bt_navigator']
    use_bond: false
