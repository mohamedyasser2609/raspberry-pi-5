global_ekf:
  ros__parameters:

    frequency: 15.0
    two_d_mode: true
    publish_tf: false

    # =====================
    # ODOM (from local fusion)
    # =====================
    odom0: /odometry/filtered

    odom0_config: [true, true, false,
                   false, false, true,
                   true, false, false,
                   false, false, true,
                   false, false, false]

    # =====================
    # IMU (optional but recommended)
    # =====================
    imu0: /imu/data_raw

    imu0_config: [false, false, false,
                  true, true, true,
                  false, false, false,
                  true, true, true,
                  false, false, false]

    imu0_remove_gravitational_acceleration: true

    # =====================
    # GPS (NEW 🔥)
    # =====================
    gps0: /odometry/gps   
    gps0_config: [true, true, false,
                  false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, false]

    gps0_differential: false
    gps0_relative: false

    # =====================
    # FRAMES
    # =====================
    world_frame: map
    odom_frame: odom
    base_link_frame: base_link
