local_ekf:
  ros__parameters:

    frequency: 15.0
    two_d_mode: true

    # =========================
    # INPUTS
    # =========================
    odom0: /odom_raw

    odom0_config: [true, true, false,
                   false, false, true,
                   true, false, false,
                   false, false, true,
                   false, false, false]

    odom0_differential: false
    odom0_relative: false

    # IMU (Ready for the future)
    imu0: /imu/data_raw

    imu0_config: [false, false, false,
                  true, true, true,
                  false, false, false,
                  true, true, true,
                  false, false, false]

    imu0_remove_gravitational_acceleration: true

    imu0_differential: false
    imu0_relative: false

    # =========================
    # OUTPUT
    # =========================
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    publish_tf: true
